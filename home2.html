<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Portal</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
}

/* Navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  padding:15px 20px;
  border-bottom:1px solid #ddd;
}

.logo{
  font-size:22px;
  font-weight:bold;
  text-decoration:none;
  color:black;
}

.navbar ul{
  list-style:none;
  display:flex;
  margin:0;
  padding:0;
}

.navbar ul li{
  margin-left:20px;
}

.navbar ul li a{
  text-decoration:none;
  color:black;
}

.navbar ul li a:hover{
  color:#4CAF50;
}

/* Hero Section */
.hero{
  position:relative;
  height:calc(100vh - 70px);
  background-image:url("https://images.unsplash.com/photo-1551836022-d5d88e9218df");
  background-size:cover;
  background-position:center;
}

/* Transparent overlay */
.hero::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
}

/* Center content */
.center-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  color:white;
  z-index:2;
}

/* Quote text */
.quote{
  font-size:28px;
  margin-bottom:20px;
  font-weight:bold;
}

/* Button */
button{
  padding:15px 35px;
  font-size:20px;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#45a049;
}

</style>
</head>

<body>

<nav class="navbar">
  <a href="#" class="logo">Job Portal</a>

  <ul>
    <li><a href="./about.html">About</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="hero">

  <div class="center-content">
    <div class="quote">"Find a job you love and you will never work a day in your life."</div>
    <button onclick="start()">Get Started</button>
  </div>

</div>

<script>
function start(){
  window.location.href="registration.html";
}
</script>

</body>
</html>
