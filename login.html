<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectWith - Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6fb;
    margin:0;
}

/* Form container */
form{
    max-width:500px;
    margin:70px auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    border:3px solid #007BFF;
}

/* Header */
nav{
    background:#007BFF;
    padding:10px;
}

h2{
    text-align:center;
    color:white;
    margin:0;
}

/* Labels */
label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}

/* Inputs */
input{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    box-sizing:border-box;
    border:1px solid #ccc;
    border-radius:4px;
}

/* Button */
button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

/* Footer */
footer{
    text-align:center;
    margin-top:10px;
}

footer a{
    color:#007BFF;
    text-decoration:none;
}

footer a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<form action="/login" method="post">

<nav>
<h2>Login Form</h2>
</nav>

<hr>

<label for="email">Email</label>
<input type="email" id="email" name="email" required>

<label for="password">Password</label>
<input type="password" id="password" name="password" required>

<button type="submit">Login</button>

<footer>
<p>Not having account? <a href="registration.html">Register here</a></p>
</footer>

</form>

</body>
</html>
